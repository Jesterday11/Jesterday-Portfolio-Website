<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Jestery's Portfolio</title>
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        .not-found {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .not-found h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .not-found p {
            margin-bottom: 1.5rem;
        }
        .not-found .btn {
            display: inline-block;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
        }
    </style>
</head>
<body class="preload dark-mode">
    <div class="page-content">
        <section class="not-found">
            <h1>404</h1>
            <p>Oops - this page wandered off into the underworld.</p>
            <a class="btn" href="index.html">Return Home</a>
        </section>
    </div>
    <script src="JavaScript/main.js" defer></script>
</body>
</html>
